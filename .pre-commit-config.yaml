# Pre-commit hooks 配置
# 安装: pip install pre-commit
# 激活: pre-commit install
# 手动运行: pre-commit run --all-files

repos:
  # 通用预提交 hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: 删除行尾空格
      - id: end-of-file-fixer
        name: 确保文件以换行符结尾
      - id: check-yaml
        name: 检查 YAML 语法
      - id: check-added-large-files
        name: 检查大文件
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: 检查合并冲突标记
      - id: check-case-conflict
        name: 检查大小写冲突
      - id: detect-private-key
        name: 检测私钥
      - id: check-json
        name: 检查 JSON 语法
      - id: pretty-format-json
        name: 格式化 JSON
        args: ['--autofix', '--indent=2']

  # Black 代码格式化
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        name: Black 代码格式化
        language_version: python3
        args: [--line-length=100]

  # Flake8 代码风格检查
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Flake8 代码风格检查
        args: [
          '--max-line-length=100',
          '--extend-ignore=E203,W503',
          '--per-file-ignores=__init__.py:F401'
        ]

  # isort 导入排序
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: isort 导入排序
        args: [--profile=black, --line-length=100]

  # MyPy 类型检查
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        name: MyPy 类型检查
        args: [
          '--ignore-missing-imports',
          '--disallow-untyped-defs=False',
          '--check-untyped-defs'
        ]
        additional_dependencies: [
          'types-requests',
          'types-PyYAML',
          'pydantic>=2.0.0'
        ]
        files: ^src/

  # 安全性检查
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: Bandit 安全性检查
        args: ['-c', 'pyproject.toml']
        additional_dependencies: ['bandit[toml]']

  # 代码复杂度检查
  - repo: https://github.com/pycqa/pylint
    rev: v3.1.0
    hooks:
      - id: pylint
        name: Pylint 代码质量检查
        args: [
          '--disable=C0114,C0115,C0116,C0301,R0903,R0913,R0914,W0718',
          '--max-line-length=100'
        ]
        files: ^src/

# 排除不需要检查的文件和目录
exclude: |
  (?x)^(
    data/.*|
    models/.*|
    logs/.*|
    \.venv/.*|
    venv/.*|
    node_modules/.*|
    build/.*|
    dist/.*|
    \.git/.*|
    \.pytest_cache/.*|
    \.mypy_cache/.*|
    \.coverage|
    coverage\.html|
    htmlcov/.*
  )$

# 失败时是否显示 hook 输出
fail_fast: false

# 默认语言版本
default_language_version:
  python: python3.10
