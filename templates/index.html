<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CourseQA &mdash; 专业课程答疑</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@350;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --sidebar:    #141c2e;
    --sidebar-hv: #1d2844;
    --bg:         #fafbfc;
    --surface:    #ffffff;
    --primary:    #3355e1;
    --primary-hv: #2545cc;
    --primary-gh: #eef1fd;
    --emerald:    #007a5e;
    --emerald-bg: #e6f5f0;
    --amber:      #b45309;
    --amber-bg:   #fef7ed;
    --text:       #1e293b;
    --text-sec:   #64748b;
    --text-ter:   #94a3b8;
    --border:     #e8ecf1;
    --border-lt:  #f1f4f8;
    --red:        #dc2626;
    --radius:     10px;
    --radius-sm:  6px;
    --shadow:     0 1px 3px rgba(20,28,46,0.06), 0 1px 2px rgba(20,28,46,0.04);
    --shadow-md:  0 4px 16px rgba(20,28,46,0.08);
    --font:       'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono:       'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
  }

  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  html, body { height:100%; font-family:var(--font); font-size:14.5px; color:var(--text); background:var(--bg); -webkit-font-smoothing:antialiased; }
  button { font-family:inherit; cursor:pointer; border:none; outline:none; }
  input, textarea { font-family:inherit; outline:none; }

  /* ============ LAYOUT ============ */
  .app { display:flex; height:100vh; }

  /* ---- Sidebar ---- */
  .sidebar {
    width:280px; flex-shrink:0; background:var(--sidebar); color:#fff;
    display:flex; flex-direction:column; overflow:hidden;
  }
  .sidebar-brand {
    padding:20px 20px 16px; display:flex; align-items:center; gap:10px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .sidebar-logo {
    width:34px; height:34px; border-radius:8px; background:var(--primary);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:16px; letter-spacing:-0.02em;
  }
  .sidebar-title { font-size:15px; font-weight:600; letter-spacing:-0.01em; }
  .sidebar-sub { font-size:10.5px; color:rgba(255,255,255,0.45); text-transform:uppercase; letter-spacing:0.06em; }

  .sidebar-new {
    margin:14px 16px; padding:10px 16px; border-radius:var(--radius);
    background:transparent; border:1px solid rgba(255,255,255,0.14);
    color:rgba(255,255,255,0.85); font-size:13px; font-weight:500;
    text-align:left; display:flex; align-items:center; gap:8px;
    transition:all 0.18s;
  }
  .sidebar-new:hover { background:var(--sidebar-hv); border-color:rgba(255,255,255,0.28); }
  .sidebar-new svg { width:15px; height:15px; opacity:0.65; }

  /* Course filter chips */
  .sidebar-courses {
    padding:6px 16px 12px; display:flex; flex-wrap:wrap; gap:6px;
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .sidebar-courses-label {
    width:100%; font-size:10px; text-transform:uppercase;
    letter-spacing:0.07em; color:rgba(255,255,255,0.35); margin-bottom:2px;
  }
  .course-chip {
    padding:3px 10px; border-radius:12px; font-size:11.5px; font-weight:500;
    border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.6);
    background:transparent; transition:all 0.18s;
  }
  .course-chip:hover { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.9); }
  .course-chip.active { background:var(--primary); border-color:var(--primary); color:#fff; }

  /* History list */
  .sidebar-history { flex:1; overflow-y:auto; padding:8px 12px; }
  .sidebar-history-label {
    font-size:10px; text-transform:uppercase; letter-spacing:0.07em;
    color:rgba(255,255,255,0.3); padding:6px 8px 8px;
  }
  .history-item {
    padding:10px 12px; border-radius:var(--radius-sm); cursor:pointer;
    font-size:13px; color:rgba(255,255,255,0.6); transition:all 0.15s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    margin-bottom:2px;
  }
  .history-item:hover { background:var(--sidebar-hv); color:rgba(255,255,255,0.9); }
  .history-item.active { background:rgba(51,85,225,0.18); color:#fff; }

  .sidebar-footer {
    padding:12px 16px; border-top:1px solid rgba(255,255,255,0.08);
    font-size:11px; color:rgba(255,255,255,0.3);
  }

  /* ---- Main ---- */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }

  /* Header */
  .header {
    padding:12px 28px; background:var(--surface); border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .header-filter-label { font-size:11px; color:var(--text-ter); font-weight:500; letter-spacing:0.04em; text-transform:uppercase; }
  .header-filter-chips { display:flex; gap:6px; flex-wrap:wrap; }
  .filter-chip {
    padding:4px 12px; border-radius:14px; font-size:12px; font-weight:500;
    background:var(--bg); color:var(--text-sec); border:1px solid var(--border);
    transition:all 0.18s;
  }
  .filter-chip:hover { border-color:var(--primary); color:var(--primary); }
  .filter-chip.active { background:var(--primary-gh); border-color:var(--primary); color:var(--primary); }

  .header-status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text-ter); }
  .status-dot { width:7px; height:7px; border-radius:50%; background:var(--emerald); }

  /* ---- Chat ---- */
  .chat { flex:1; overflow-y:auto; padding:24px 0; scroll-behavior:smooth; }

  .chat-inner { max-width:740px; margin:0 auto; padding:0 28px; display:flex; flex-direction:column; gap:4px; }

  /* Welcome */
  .welcome { text-align:center; padding:32px 0 28px; animation:fadeIn 0.5s ease-out; }
  .welcome h2 { font-size:26px; font-weight:700; letter-spacing:-0.03em; color:var(--text); margin-bottom:6px; }
  .welcome p { font-size:14px; color:var(--text-sec); max-width:380px; margin:0 auto 20px; line-height:1.65; }
  .welcome-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; max-width:420px; margin:0 auto; }
  .welcome-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:12px 16px; text-align:left; font-size:13px; color:var(--text-sec);
    cursor:pointer; transition:all 0.18s;
  }
  .welcome-card:hover { border-color:var(--primary); box-shadow:var(--shadow); color:var(--text); }
  .welcome-card .icon { font-size:18px; margin-bottom:4px; display:block; }

  /* ---- Message ---- */
  .msg { display:flex; gap:14px; padding:8px 0; animation:fadeIn 0.3s ease-out; }
  .msg-you { flex-direction:row-reverse; }
  .msg-avatar {
    width:32px; height:32px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-weight:600; font-size:12px;
  }
  .msg-you .msg-avatar { background:var(--primary); color:#fff; }
  .msg-bot .msg-avatar { background:var(--bg); color:var(--primary); border:1px solid var(--border); font-size:15px; }

  .msg-body { max-width:82%; min-width:0; }
  .msg-you .msg-body { display:flex; flex-direction:column; align-items:flex-end; }

  .msg-bubble {
    padding:12px 18px; border-radius:var(--radius); line-height:1.68;
    font-size:14px; position:relative; word-break:break-word;
  }
  .msg-you .msg-bubble { background:var(--primary); color:#fff; border-bottom-right-radius:3px; }
  .msg-bot .msg-bubble { background:var(--surface); color:var(--text); border:1px solid var(--border); border-bottom-left-radius:3px; box-shadow:var(--shadow); }

  .msg-bubble p + p { margin-top:0.55em; }
  .msg-bubble strong { font-weight:600; }
  .msg-bubble code {
    font-family:var(--mono); font-size:0.88em; background:rgba(0,0,0,0.07); padding:2px 5px;
    border-radius:4px;
  }
  .msg-bubble pre {
    font-family:var(--mono); font-size:0.82em; line-height:1.55;
    background:var(--sidebar); color:#d4dbe8; padding:14px 18px; border-radius:var(--radius-sm);
    overflow-x:auto; margin:8px 0;
  }
  .msg-bubble pre code { background:none; padding:0; }

  /* Message actions (copy button) */
  .msg-actions { display:flex; gap:6px; margin-top:6px; opacity:0; transition:opacity 0.2s; }
  .msg:hover .msg-actions { opacity:1; }
  .msg-action {
    padding:4px 10px; border-radius:5px; font-size:11px; font-weight:500;
    background:var(--bg); color:var(--text-sec); border:1px solid var(--border);
    cursor:pointer; display:flex; align-items:center; gap:5px; transition:all 0.15s;
  }
  .msg-action:hover { background:var(--primary-gh); color:var(--primary); border-color:var(--primary); }
  .msg-action.copied { background:var(--emerald-bg); color:var(--emerald); border-color:var(--emerald); }

  /* ---- Footnotes (signature) ---- */
  .footnotes {
    margin-top:10px; padding-top:10px;
    border-top:1px solid var(--border); position:relative;
  }
  .footnotes::before {
    content:''; position:absolute; top:-1px; left:0;
    width:20px; height:2px; background:var(--emerald);
  }
  .fn-label { font-size:10.5px; font-weight:600; color:var(--emerald); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:4px; }
  .fn-item { font-size:11.5px; color:var(--text-sec); line-height:1.55; padding:1px 0; display:flex; gap:6px; }
  .fn-num { font-family:var(--mono); font-size:10px; color:var(--emerald); min-width:18px; font-weight:500; }

  /* ---- Typing ---- */
  .typing { display:flex; gap:14px; padding:8px 0; }
  .typing-dots { display:flex; gap:5px; align-items:center; padding:16px 20px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); border-bottom-left-radius:3px; box-shadow:var(--shadow); }
  .typing-dot { width:7px; height:7px; border-radius:50%; background:var(--text-ter); animation:bounce 1.4s infinite ease-in-out both; }
  .typing-dot:nth-child(1) { animation-delay:0s; }
  .typing-dot:nth-child(2) { animation-delay:0.16s; }
  .typing-dot:nth-child(3) { animation-delay:0.32s; }

  @keyframes bounce {
    0%,80%,100% { transform:scale(0.55); opacity:0.35; }
    40% { transform:scale(1); opacity:1; }
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ---- Input ---- */
  .input-zone { padding:16px 28px 20px; background:var(--surface); border-top:1px solid var(--border); }
  .input-row { display:flex; gap:8px; align-items:flex-end; max-width:740px; margin:0 auto; }
  .input-box {
    flex:1; display:flex; gap:10px; align-items:flex-end;
    background:var(--bg); border:1px solid var(--border); border-radius:14px;
    padding:8px 8px 8px 18px; transition:all 0.2s;
  }
  .input-box:focus-within { border-color:var(--primary); box-shadow:0 0 0 3px rgba(51,85,225,0.1); background:var(--surface); }
  .input-box textarea {
    flex:1; border:none; background:transparent; resize:none;
    font-size:14px; line-height:1.5; color:var(--text); outline:none;
    min-height:22px; max-height:130px; padding:5px 0; align-self:center;
  }
  .input-box textarea::placeholder { color:var(--text-ter); }

  /* Tool buttons */
  .tool-btn {
    width:34px; height:34px; border-radius:50%; background:transparent;
    color:var(--text-sec); display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; flex-shrink:0;
  }
  .tool-btn:hover { background:var(--primary-gh); color:var(--primary); }
  .tool-btn.recording { background:#fef2f2; color:var(--red); animation:pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { box-shadow:0 0 0 0 rgba(220,38,38,0.25); } 50% { box-shadow:0 0 0 8px rgba(220,38,38,0); } }

  .tool-btn svg { width:18px; height:18px; }

  .btn-send {
    width:42px; height:42px; border-radius:50%; background:var(--primary);
    color:#fff; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:all 0.18s;
  }
  .btn-send:hover { background:var(--primary-hv); transform:scale(1.04); }
  .btn-send:active { transform:scale(0.95); }
  .btn-send:disabled { background:var(--border); cursor:not-allowed; transform:none; }
  .btn-send svg { width:18px; height:18px; }

  /* Image preview */
  .img-preview {
    display:inline-flex; gap:6px; align-items:center; margin-top:8px;
    padding:6px 10px; background:var(--bg); border:1px solid var(--border);
    border-radius:8px; font-size:12px; color:var(--text-sec);
  }
  .img-preview img { width:48px; height:48px; object-fit:cover; border-radius:4px; }
  .img-preview .remove { cursor:pointer; color:var(--text-ter); font-weight:700; margin-left:4px; }
  .img-preview .remove:hover { color:var(--red); }

  /* Scrollbar */
  .chat::-webkit-scrollbar, .sidebar-history::-webkit-scrollbar { width:5px; }
  .chat::-webkit-scrollbar-thumb, .sidebar-history::-webkit-scrollbar-thumb { background:var(--border); border-radius:10px; }
  .sidebar-history::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); }

  /* ---- Mobile ---- */
  @media (max-width: 720px) {
    .sidebar { display:none; }
    .chat-inner { padding:0 16px; }
    .input-zone { padding:12px 16px 16px; }
    .header { padding:10px 16px; }
    .msg-body { max-width:88%; }
    .msg-bubble { padding:10px 14px; font-size:13.5px; }
    .welcome h2 { font-size:22px; }
    .welcome-grid { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo">Q</div>
      <div>
        <div class="sidebar-title">CourseQA</div>
        <div class="sidebar-sub">专业课程答疑</div>
      </div>
    </div>

    <button class="sidebar-new" onclick="newChat()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新对话
    </button>

    <div class="sidebar-courses">
      <div class="sidebar-courses-label">课程筛选</div>
      <button class="course-chip active" data-course="all" onclick="filterCourse('all', this)">全部</button>
      <button class="course-chip" data-course="数据结构" onclick="filterCourse('数据结构', this)">数据结构</button>
      <button class="course-chip" data-course="操作系统" onclick="filterCourse('操作系统', this)">操作系统</button>
      <button class="course-chip" data-course="计算机网络" onclick="filterCourse('计算机网络', this)">计算机网络</button>
      <button class="course-chip" data-course="软件工程" onclick="filterCourse('软件工程', this)">软件工程</button>
    </div>

    <div class="sidebar-history" id="historyList">
      <div class="sidebar-history-label">对话历史</div>
    </div>

    <div class="sidebar-footer">CourseQA v0.2</div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <!-- Header -->
    <header class="header">
      <div class="header-filter-chips" id="headerFilters"></div>
      <div class="header-status">
        <span class="status-dot"></span> 就绪
      </div>
    </header>

    <!-- Chat -->
    <main class="chat" id="chat">
      <div class="chat-inner" id="chatInner">
        <div class="welcome">
          <h2>你好，我是你的课程助教</h2>
          <p>基于知识库精准回答，标注引用来源。支持语音输入和图片提问。</p>
          <div class="welcome-grid">
            <div class="welcome-card" onclick="askHint('什么是堆排序？它的时间复杂度是多少？')">
              <span class="icon">&#9654;</span>堆排序的原理与复杂度
            </div>
            <div class="welcome-card" onclick="askHint('死锁产生的四个必要条件是什么？如何预防？')">
              <span class="icon">&#9654;</span>死锁的条件与预防
            </div>
            <div class="welcome-card" onclick="askHint('TCP三次握手的过程是怎样的？')">
              <span class="icon">&#9654;</span>TCP 三次握手过程
            </div>
            <div class="welcome-card" onclick="askHint('二叉树的遍历方式有哪些？各自的特点是什么？')">
              <span class="icon">&#9654;</span>二叉树的遍历方式
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Input -->
    <div class="input-zone">
      <div class="input-row">
        <div class="input-box">
          <!-- Voice -->
          <button class="tool-btn" id="voiceBtn" onclick="toggleVoice()" title="语音输入">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/>
              <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <!-- Image upload -->
          <button class="tool-btn" id="imageBtn" onclick="document.getElementById('fileInput').click()" title="上传图片">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
              <circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
          </button>
          <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleImageUpload(event)">
          <textarea id="questionInput" rows="1" placeholder="输入课程问题…" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="btn-send" id="sendBtn" onclick="sendMessage()" aria-label="发送">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
      <!-- Image preview -->
      <div class="img-preview" id="imgPreview" style="display:none">
        <img id="imgThumb" src="" alt="preview">
        <span id="imgName"></span>
        <span class="remove" onclick="removeImage()">&times;</span>
      </div>
    </div>
  </div>
</div>

<script>
  // ============ STATE ============
  let isWaiting = false;
  let currentCourse = 'all';
  let uploadedImage = null; // { name, base64 }
  let recognition = null;
  let isRecording = false;
  let conversationHistory = []; // [{id, title, course}]

  // ============ AUTO-RESIZE ============
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  }

  // ============ KEYBOARD ============
  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  // ============ COURSE FILTER ============
  function filterCourse(course, btn) {
    currentCourse = course;
    document.querySelectorAll('.course-chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
  }

  // ============ RESTORE ON LOAD ============
  async function restoreFromServer() {
    try {
      const resp = await fetch('/api/history');
      const data = await resp.json();
      const msgs = data.messages || [];
      if (!msgs.length) return;

      const chatInner = document.getElementById('chatInner');
      const welcome = chatInner.querySelector('.welcome');
      if (welcome) welcome.remove();

      // 清空现有消息，重建全部
      chatInner.innerHTML = '';

      for (const m of msgs) {
        if (m.role === 'user') {
          appendUserMsg(m.content, null);
          addHistoryItem(m.content);
        } else {
          appendBotMsgRestore(m.content);
        }
      }
      scrollBottom();
    } catch (e) { /* 忽略网络错误 */ }
  }

  function appendBotMsgRestore(text) {
    const el = document.createElement('div');
    el.className = 'msg msg-bot';
    el.innerHTML = `
      <div class="msg-avatar">Q</div>
      <div class="msg-body">
        <div class="msg-bubble">${formatMarkdown(text)}</div>
        <div class="msg-actions">
          <button class="msg-action" onclick="copyAnswer(this)" data-text="${escapeAttr(text)}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
        </div>
      </div>`;
    document.getElementById('chatInner').appendChild(el);
  }

  function addHistoryItem(title) {
    conversationHistory.unshift({ id: Date.now(), title, course: currentCourse });
    if (conversationHistory.length > 50) conversationHistory.length = 50;
    renderHistory();
  }

  // ============ HISTORY LIST ============
  function addHistory(title) { addHistoryItem(title); }

  function renderHistory() {
    const list = document.getElementById('historyList');
    const filtered = currentCourse === 'all' ? conversationHistory : conversationHistory.filter(h => h.course === currentCourse);
    list.innerHTML = '<div class="sidebar-history-label">对话历史</div>' +
      filtered.map(h => `<div class="history-item" onclick="alert('切换历史功能开发中')" title="${escapeAttr(h.title)}">${escapeHtml(h.title.substring(0,28))}${h.title.length>28?'…':''}</div>`).join('');
  }

  function newChat() {
    document.getElementById('chatInner').innerHTML = `
      <div class="welcome">
        <h2>新对话</h2>
        <p>选择课程或直接提问开始。</p>
        <div class="welcome-grid">
          <div class="welcome-card" onclick="askHint('什么是堆排序？它的时间复杂度是多少？')"><span class="icon">&#9654;</span>堆排序的原理与复杂度</div>
          <div class="welcome-card" onclick="askHint('死锁产生的四个必要条件是什么？')"><span class="icon">&#9654;</span>死锁的条件与预防</div>
          <div class="welcome-card" onclick="askHint('TCP三次握手的过程是怎样的？')"><span class="icon">&#9654;</span>TCP 三次握手过程</div>
          <div class="welcome-card" onclick="askHint('二叉树的遍历方式有哪些？')"><span class="icon">&#9654;</span>二叉树的遍历方式</div>
        </div>
      </div>`;
    fetch('/api/reset', { method:'POST' }).catch(()=>{});
  }

  // ============ HINT ============
  function askHint(q) { document.getElementById('questionInput').value = q; sendMessage(); }

  // ============ VOICE ============
  function toggleVoice() {
    const btn = document.getElementById('voiceBtn');
    if (isRecording) { stopVoice(); return; }
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) { alert('你的浏览器不支持语音识别'); return; }
    recognition = new SpeechRecognition();
    recognition.lang = 'zh-CN';
    recognition.interimResults = true;
    recognition.continuous = true;
    recognition.onresult = e => {
      let t = ''; for (let i=e.resultIndex;i<e.results.length;i++) t+=e.results[i][0].transcript;
      document.getElementById('questionInput').value = t;
    };
    recognition.onend = () => { btn.classList.remove('recording'); isRecording = false; };
    recognition.onerror = () => { btn.classList.remove('recording'); isRecording = false; };
    recognition.start();
    btn.classList.add('recording');
    isRecording = true;
  }
  function stopVoice() { if (recognition) { recognition.stop(); recognition = null; } }

  // ============ IMAGE ============
  function handleImageUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 20*1024*1024) { alert('图片大小不能超过 20MB'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      uploadedImage = { name: file.name, base64: reader.result };
      document.getElementById('imgPreview').style.display = 'inline-flex';
      document.getElementById('imgThumb').src = reader.result;
      document.getElementById('imgName').textContent = file.name;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function removeImage() {
    uploadedImage = null;
    document.getElementById('imgPreview').style.display = 'none';
  }

  // ============ SEND ============
  async function sendMessage() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if ((!question && !uploadedImage) || isWaiting) return;

    const chatInner = document.getElementById('chatInner');
    const welcome = chatInner.querySelector('.welcome');
    if (welcome) welcome.remove();

    // User message
    const displayText = question || (uploadedImage ? '[图片] ' + uploadedImage.name : '');
    appendUserMsg(displayText, uploadedImage?.base64);

    const sentQuestion = question;
    const sentImage = uploadedImage;
    input.value = ''; input.style.height = 'auto';
    removeImage();

    // Typing
    isWaiting = true;
    document.getElementById('sendBtn').disabled = true;
    const typingEl = appendTyping();
    scrollBottom();

    try {
      const body = { question: sentQuestion };
      if (sentImage) body.image = sentImage.base64;
      if (currentCourse !== 'all') body.course = currentCourse;

      const resp = await fetch('/api/ask', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body),
      });
      const data = await resp.json();
      typingEl.remove();
      if (data.error) appendBotMsg('请求失败：' + data.error, null, true);
      else appendBotMsg(data.answer, data.sources);
      if (sentQuestion) addHistory(sentQuestion);
    } catch (e) {
      typingEl.remove();
      appendBotMsg('网络连接失败，请确认服务已启动。', null, true);
    }
    isWaiting = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('questionInput').focus();
    scrollBottom();
  }

  // ============ APPEND MESSAGES ============
  function appendUserMsg(text, imageB64) {
    const el = document.createElement('div');
    el.className = 'msg msg-you';
    let imgHtml = '';
    if (imageB64) imgHtml = `<img src="${imageB64}" style="max-width:260px;max-height:200px;border-radius:6px;display:block;margin-bottom:6px;">`;
    el.innerHTML = `<div class="msg-avatar">U</div><div class="msg-body"><div class="msg-bubble">${imgHtml}${escapeHtml(text)}</div></div>`;
    document.getElementById('chatInner').appendChild(el);
  }

  function appendBotMsg(text, sources, isError) {
    const el = document.createElement('div');
    el.className = 'msg msg-bot';
    const body = isError
      ? `<span style="color:var(--red)">${escapeHtml(text)}</span>`
      : formatMarkdown(text) + buildFootnotes(sources);
    el.innerHTML = `
      <div class="msg-avatar">Q</div>
      <div class="msg-body">
        <div class="msg-bubble">${body}</div>
        <div class="msg-actions">
          <button class="msg-action" onclick="copyAnswer(this)" data-text="${escapeAttr(text)}">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            复制
          </button>
        </div>
      </div>`;
    document.getElementById('chatInner').appendChild(el);
    return el;
  }

  function appendTyping() {
    const el = document.createElement('div');
    el.className = 'typing';
    el.innerHTML = `<div class="msg-avatar" style="width:32px;height:32px;border-radius:50%;background:var(--bg);color:var(--primary);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:15px;">Q</div><div class="typing-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>`;
    document.getElementById('chatInner').appendChild(el);
    return el;
  }

  // ============ FOOTNOTES ============
  function buildFootnotes(sources) {
    if (!sources || !sources.length) return '';
    let html = '<div class="footnotes"><div class="fn-label">参考文献</div>';
    sources.forEach((s,i) => {
      html += `<div class="fn-item"><span class="fn-num">[${i+1}]</span><span>${escapeHtml(s.file)} &middot; 第${s.page}页${s.score ? ' &middot; r='+s.score.toFixed(3) : ''}</span></div>`;
    });
    return html + '</div>';
  }

  // ============ COPY ============
  function copyAnswer(btn) {
    const text = btn.dataset.text;
    navigator.clipboard.writeText(text).then(() => {
      btn.classList.add('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
      }, 2000);
    }).catch(() => alert('复制失败'));
  }

  // ============ MARKDOWN ============
  function formatMarkdown(text) {
    let html = escapeHtml(text);
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
      `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  // ============ HELPERS ============
  function escapeHtml(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML; }
  function escapeAttr(t) { return t.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function scrollBottom() { requestAnimationFrame(()=>{const c=document.getElementById('chat');c.scrollTop=c.scrollHeight;}); }

  // ============ INIT ============
  document.getElementById('questionInput').focus();
  restoreFromServer();
</script>
</body>
</html>
