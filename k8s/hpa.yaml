apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: course-qa-hpa
  namespace: course-qa
  labels:
    app: course-qa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: course-qa
  minReplicas: 2
  maxReplicas: 10
  metrics:
  # CPU 利用率
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  
  # 内存利用率
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  
  # 自定义指标（需要 Prometheus Adapter）
  # - type: Pods
  #   pods:
  #     metric:
  #       name: http_requests_per_second
  #     target:
  #       type: AverageValue
  #       averageValue: "100"
  
  # 行为配置
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
