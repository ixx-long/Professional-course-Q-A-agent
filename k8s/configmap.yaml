apiVersion: v1
kind: ConfigMap
metadata:
  name: course-qa-config
  namespace: course-qa
  labels:
    app: course-qa
data:
  config.yaml: |
    # 应用配置
    app:
      host: "0.0.0.0"
      port: 5000
      debug: false
      workers: 4
      timeout: 120
    
    # 日志配置
    logging:
      level: "INFO"
      format: "json"
      file: "/app/logs/app.log"
    
    # 内存配置
    memory:
      max_sessions: 1000
      session_timeout: 3600
    
    # 缓存配置
    cache:
      type: "redis"
      redis_url: "redis://redis-service:6379/0"
      ttl: 3600
    
    # 安全配置
    security:
      enable_auth: true
      enable_rate_limit: true
      rate_limit_requests: 100
      rate_limit_window: 60
    
    # 监控配置
    monitoring:
      enabled: true
      metrics_port: 9090
